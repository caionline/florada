<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Florada — cannabis medicinal avaliada por quem usa</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* tone: warm neutral + sage primary + amber accent */
    --bg:        oklch(0.975 0.013 92);
    --bg-2:      oklch(0.955 0.016 92);
    --surface:   oklch(0.995 0.005 95);
    --surface-2: oklch(0.982 0.011 92);
    --ink:       oklch(0.27 0.022 80);
    --ink-soft:  oklch(0.44 0.02 80);
    --muted:     oklch(0.56 0.018 85);
    --line:      oklch(0.9 0.012 90);
    --line-2:    oklch(0.84 0.016 88);

    --primary:      oklch(0.5 0.072 152);
    --primary-deep: oklch(0.38 0.06 152);
    --primary-soft: oklch(0.93 0.03 152);
    --primary-tint: oklch(0.96 0.018 152);

    --accent:      oklch(0.68 0.13 56);
    --accent-deep: oklch(0.55 0.12 48);
    --accent-soft: oklch(0.94 0.04 70);

    --star:    oklch(0.72 0.13 75);

    --radius: 16px;
    --radius-sm: 10px;
    --radius-lg: 24px;
    --shadow-sm: 0 1px 2px oklch(0.4 0.03 80 / 0.06), 0 1px 3px oklch(0.4 0.03 80 / 0.05);
    --shadow:    0 2px 4px oklch(0.4 0.03 80 / 0.05), 0 8px 24px oklch(0.4 0.03 80 / 0.08);
    --shadow-lg: 0 12px 40px oklch(0.4 0.03 80 / 0.14);

    --font-head: "Schibsted Grotesk", system-ui, sans-serif;
    --font-body: "Hanken Grotesk", system-ui, sans-serif;
    --font-mono: "Space Mono", ui-monospace, monospace;

    --maxw: 1180px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.5;
  }
  h1, h2, h3, h4, h5 { font-family: var(--font-head); margin: 0; line-height: 1.08; letter-spacing: -0.02em; font-weight: 700; }
  p { margin: 0; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; }
  ::selection { background: var(--primary-soft); }

  .mono { font-family: var(--font-mono); }

  /* scrollbars */
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 10px; border: 2px solid var(--bg); }
  *::-webkit-scrollbar-track { background: transparent; }

  #root { min-height: 100vh; }

  /* ----- App chrome ----- */
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 24px; }

  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: oklch(0.975 0.013 92 / 0.86);
    backdrop-filter: saturate(1.4) blur(14px);
    border-bottom: 1px solid var(--line);
  }
  .topbar-inner { display: flex; align-items: center; gap: 18px; height: 68px; }
  .brand { display: flex; align-items: center; gap: 10px; font-family: var(--font-head); font-weight: 800; font-size: 22px; letter-spacing: -0.03em; color: var(--ink); }
  .brand .mark { width: 30px; height: 30px; flex: none; }
  .nav { display: flex; align-items: center; gap: 4px; margin-left: 8px; }
  .nav button {
    padding: 9px 14px; border-radius: 999px; font-weight: 600; font-size: 14.5px; color: var(--ink-soft);
    transition: background .15s, color .15s;
  }
  .nav button:hover { background: var(--surface-2); color: var(--ink); }
  .nav button.active { background: var(--primary-tint); color: var(--primary-deep); }
  .topbar-spacer { flex: 1; }

  .iconbtn { width: 40px; height: 40px; border-radius: 999px; display: grid; place-items: center; color: var(--ink-soft); transition: background .15s; }
  .iconbtn:hover { background: var(--surface-2); }
  .avatar-btn { width: 40px; height: 40px; border-radius: 999px; background: var(--primary); color: white; display: grid; place-items: center; font-weight: 700; font-family: var(--font-head); }

  /* buttons */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 11px 18px; border-radius: 999px; font-weight: 600; font-size: 14.5px; transition: transform .08s, background .15s, box-shadow .15s; white-space: nowrap; }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
  .btn-primary:hover { background: var(--primary-deep); }
  .btn-accent { background: var(--accent); color: oklch(0.25 0.04 50); }
  .btn-accent:hover { background: var(--accent-deep); color: white; }
  .btn-ghost { background: var(--surface); border: 1px solid var(--line-2); color: var(--ink); }
  .btn-ghost:hover { background: var(--surface-2); border-color: var(--muted); }
  .btn-sm { padding: 7px 13px; font-size: 13px; }

  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); }

  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: 999px; font-size: 12.5px; font-weight: 600; border: 1px solid var(--line-2); color: var(--ink-soft); background: var(--surface); white-space: nowrap; }
  .chip.on { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  .label-cap { font-size: 11.5px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }

  /* placeholder tiles for bud imagery */
  .ph { position: relative; overflow: hidden; border-radius: var(--radius-sm); display: grid; place-items: center; }
  .ph::after { content: attr(data-ph); position: absolute; bottom: 8px; left: 8px; font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .02em; color: oklch(1 0 0 / .82); background: oklch(0.3 0.02 80 / .28); padding: 2px 6px; border-radius: 5px; backdrop-filter: blur(2px); }

  /* responsive */
  @media (max-width: 860px) {
    .nav { display: none; }
    .hide-mobile { display: none !important; }
  }
  .mobilenav { display: none; }
  @media (max-width: 860px) {
    .mobilenav {
      display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 60;
      background: oklch(0.985 0.01 92 / 0.94); backdrop-filter: blur(14px);
      border-top: 1px solid var(--line); padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
      justify-content: space-around;
    }
    .mobilenav button { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10.5px; font-weight: 600; color: var(--muted); padding: 4px 10px; }
    .mobilenav button.active { color: var(--primary-deep); }
    .pad-bottom { padding-bottom: 78px; }
  }

  /* animation — transform-only entrance, gated; content stays visible even if anim never runs */
  @keyframes fadeUp { from { transform: translateY(13px); } to { transform: translateY(0); } }
  .fade-up { transform: none; }
  @media (prefers-reduced-motion: no-preference) {
    .fade-up { animation: fadeUp .42s cubic-bezier(.2,.7,.3,1) both; }
  }

  /* effect bars */
  .bar-track { height: 7px; border-radius: 999px; background: var(--line); overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 999px; }

  /* responsive layout collapses */
  @media (max-width: 920px) {
    .two-col { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 760px) {
    .wrap { padding: 0 16px; }
    .filters-aside { position: static !important; }
    div[style*="grid-template-columns: 262px"] { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="screens2.jsx"></script>
<script type="text/babel" src="main.jsx"></script>
</body>
</html>
